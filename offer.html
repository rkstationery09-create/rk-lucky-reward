<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>R.K. Stationery Offer</title>
<style>
body{
    font-family: Arial;
    text-align: center;
    padding-top: 60px;
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
}

.box{
    background: white;
    width: 300px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input, button{
    padding: 10px;
    margin-top: 10px;
    width: 80%;
    font-size: 18px;
}

button{
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

#result{
    margin-top: 20px;
    font-size: 22px;
    color: #d60000;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">

<h2>🎉 R.K. Stationery Offer</h2>

<p>Enter your purchase amount</p>

<input type="number" id="amount" placeholder="Enter ₹ amount">

<br>

<button onclick="getOffer()">Get Offer</button>

<div id="result"></div>

</div>

<script>
function getOffer(){

let amount = document.getElementById("amount").value;
let discount = 0;

if(amount >= 100 && amount < 200){
    discount = 10;
}
else if(amount >= 200 && amount < 500){
    discount = 25;
}
else if(amount >= 500 && amount < 1000){
    discount = 60;
}
else if(amount >= 1000){
    discount = 150;
}
else{
    document.getElementById("result").innerHTML = "❌ Minimum ₹100 purchase required";
    return;
}

document.getElementById("result").innerHTML =
"🎁 You got ₹" + discount + " OFF";

}
</script>

</body>
</html>
