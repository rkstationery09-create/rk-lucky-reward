<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.K. Stationery Offer</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
    padding-top: 60px;
}

.box{
    background:white;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    width:80%;
    font-size:18px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#d60000;
}
</style>
</head>

<body>

<div class="box">

<h2>🎉 R.K. Stationery Offer</h2>

<p>Scan QR & Enter Bill Amount</p>

<input type="number" id="amount" placeholder="Enter ₹ amount">

<br>

<button onclick="getOffer()">Get Offer</button>

<div id="result"></div>

</div>

<script>

function getOffer(){

let amount = Number(document.getElementById("amount").value);

if(!amount || amount < 50){
document.getElementById("result").innerHTML =
"❌ Minimum ₹50 required";
return;
}

// RULE: ₹10 = ₹1 discount
let discount = amount / 10;

document.getElementById("result").innerHTML =
"🎁 You get ₹" + discount + " OFF";
}

</script>

</body>
</html>
