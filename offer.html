<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Offer Test</title>
</head>

<body style="text-align:center;font-family:Arial;padding-top:50px;">

<h2>🎁 R.K. Stationery Offer</h2>

<input id="amount" type="number" placeholder="Enter ₹ amount">
<br><br>

<button onclick="getOffer()">Get Offer</button>

<h2 id="result"></h2>

<script>

function getOffer(){

let amount = Number(document.getElementById("amount").value);
let result = document.getElementById("result");

if(!amount || amount < 50){
result.innerHTML = "❌ Minimum ₹50 required";
return;
}

let offers = [
"🎁 ₹5 Pen",
"🎁 ₹10 Pencil",
"🎁 ₹20 Diary",
"🎁 ₹30 Color Set",
"🎁 🎉 Lucky Surprise"
];

let random = Math.floor(Math.random() * offers.length);

result.innerHTML = "₹" + amount + " → " + offers[random];
}

</script>

</body>
</html>
