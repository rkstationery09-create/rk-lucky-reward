<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R.K. Stationery Offer</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
    padding-top: 60px;
}

.box{
    background:white;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    width:80%;
    font-size:18px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    background:green;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#d60000;
}
</style>
</head>

<body>

<div class="box">

<h2>🎉 R.K. Stationery Offer</h2>

<p>Enter your bill amount</p>

<input type="number" id="amount" placeholder="Enter ₹ amount">

<br>

<button onclick="getOffer()">Get Offer</button>

<div id="result"></div>

</div>

<script>

function getOffer(){

let amount = document.getElementById("amount").value;

if(amount < 100){
document.getElementById("result").innerHTML =
"❌ Minimum ₹100 purchase required";
return;
}

// random offers
let offers = [
"🎁 Free Pen",
"🎁 Free Pencil",
"🎁 ₹10 OFF",
"🎁 ₹20 OFF",
"🎁 Free Eraser",
"🎉 Lucky Surprise Gift",
"🔥 ₹50 OFF (Mega Offer)"
];

let random = Math.floor(Math.random() * offers.length);

document.getElementById("result").innerHTML =
"Bill ₹" + amount + " → " + offers[random];

}

</script>

</body>
</html>
